<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game History</title>
    <meta name="theme-color" content="#f5f6fb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Commander" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="icon" type="image/png" href="image.png" />
    <link rel="shortcut icon" type="image/png" href="image.png" />
    <link rel="apple-touch-icon" href="image.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page-history">
    <div class="app-shell">
      <header>
        <h1>Full Game History</h1>
        <p>All entered games for your shared pod.</p>
        <div class="sync-panel">
          <div class="sync-row">
            <input id="sync-user" type="text" placeholder="Display name" autocomplete="username" />
            <input id="sync-token" type="password" placeholder="Pod access code" autocomplete="current-password" />
            <button type="button" id="sync-connect" class="secondary-button">Connect</button>
            <button type="button" id="sync-now" class="secondary-button">Sync now</button>
            <button type="button" id="sync-disconnect" class="secondary-button">Disconnect</button>
          </div>
          <small id="sync-status" class="sync-status status-muted">Cloud sync not connected.</small>
        </div>
        <div class="page-switch">
          <a href="index.html" class="page-link">Game Tracker</a>
          <a href="player.html" class="page-link">Player Stats</a>
          <a href="commander.html" class="page-link">Commander Stats</a>
          <a href="decklists.html" class="page-link">Deck Lists</a>
          <a href="deckselector.html" class="page-link">Deck Selector</a>
          <a href="records.html" class="page-link">Pod Records</a>
        </div>
      </header>
      <main>
        <section class="card">
          <div class="history-controls">
            <div class="field">
              <label for="history-sort">Sort games</label>
              <select id="history-sort">
                <option value="date">Date</option>
                <option value="winner">Winner</option>
                <option value="players">Player count</option>
                <option value="totalKills">Total kills</option>
              </select>
            </div>
            <div class="field">
              <label for="history-filter-winner">Winner</label>
              <select id="history-filter-winner">
                <option value="all">All winners</option>
              </select>
            </div>
            <div class="field">
              <label for="history-filter-commander">Commander</label>
              <select id="history-filter-commander">
                <option value="all">All commanders</option>
              </select>
            </div>
            <button type="button" id="history-sort-order" class="secondary-button">Newest first</button>
          </div>
          <div id="history-list">
            <p>Loading saved games...</p>
          </div>
        </section>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
