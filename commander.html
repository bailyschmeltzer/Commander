<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Commander Stats</title>
    <meta name="theme-color" content="#f5f6fb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Commander" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="icon" type="image/png" href="image.png" />
    <link rel="shortcut icon" type="image/png" href="image.png" />
    <link rel="apple-touch-icon" href="image.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page-commander-stats">
    <div class="app-shell">
      <header>
        <h1>Commander Stats</h1>
        <p>Commander statistics for your shared pod.</p>
        <div class="sync-panel">
          <div class="sync-row">
            <input id="sync-user" type="text" placeholder="Display name" autocomplete="username" />
            <input id="sync-token" type="password" placeholder="Pod access code" autocomplete="current-password" />
            <button type="button" id="sync-connect" class="secondary-button">Connect</button>
            <button type="button" id="sync-now" class="secondary-button">Sync now</button>
            <button type="button" id="sync-disconnect" class="secondary-button">Disconnect</button>
          </div>
          <small id="sync-status" class="sync-status status-muted">Cloud sync not connected.</small>
        </div>
        <div class="page-switch">
          <a href="index.html" class="page-link">Game Tracker</a>
          <a href="livegame.html" class="page-link">Live Tracker</a>
          <a href="rankings.html" class="page-link">Pod Rankings</a>
          <a href="player.html" class="page-link">Player Stats</a>
          <a href="history.html" class="page-link">Full History</a>
          <a href="decklists.html" class="page-link">Deck Lists</a>
          <a href="deckselector.html" class="page-link">Deck Selector</a>
          <a href="records.html" class="page-link">Pod Records</a>
        </div>
      </header>
      <main>
        <section class="card">
          <div class="field">
            <label for="commander-search">Filter by commander</label>
            <input id="commander-search" type="search" placeholder="Search commander name" />
          </div>
          <div class="player-table-wrapper">
            <table class="player-table commander-stats-table" data-sort-table="commanderStats">
              <thead>
                <tr>
                  <th class="sortable-header" data-column="commander" tabindex="0" aria-sort="none">Commander <span class="sort-indicator"></span></th>
                  <th class="sortable-header" data-column="games" tabindex="0" aria-sort="none">Games <span class="sort-indicator"></span></th>
                  <th class="sortable-header" data-column="wins" tabindex="0" aria-sort="none">Wins <span class="sort-indicator"></span></th>
                  <th class="sortable-header" data-column="winRate" tabindex="0" aria-sort="none">Win rate <span class="sort-indicator"></span></th>
                  <th class="sortable-header" data-column="kills" tabindex="0" aria-sort="none">Kills <span class="sort-indicator"></span></th>
                  <th class="sortable-header" data-column="firstBloods" tabindex="0" aria-sort="none">First Blood <span class="sort-indicator"></span></th>
                  <th class="sortable-header" data-column="kd" tabindex="0" aria-sort="none">K/D <span class="sort-indicator"></span></th>
                  <th class="sortable-header" data-column="avgPlace" tabindex="0" aria-sort="none">Avg place <span class="sort-indicator"></span></th>
                  <th class="sortable-header" data-column="expected" tabindex="0" aria-sort="none">EDHPowerLevel <span class="sort-indicator"></span></th>
                  <th class="sortable-header" data-column="actual" tabindex="0" aria-sort="none">In Pod <span class="sort-indicator"></span></th>
                  <th class="sortable-header" data-column="actualCal" tabindex="0" aria-sort="none">Out of Pod <span class="sort-indicator"></span></th>
                  <th class="sortable-header" data-column="delta" tabindex="0" aria-sort="none">Delta <span class="sort-indicator"></span></th>
                  <th class="sortable-header" data-column="confidence" tabindex="0" aria-sort="none">Confidence <span class="sort-indicator"></span></th>
                </tr>
              </thead>
              <tbody id="commander-stats-body"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
