<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Commander Stats</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header>
        <h1>Commander Stats</h1>
        <p>This page will show commander statistics once it's built.</p>
      </header>
      <main>
        <section class="card">
          <div class="field">
            <label for="commander-search">Filter by commander</label>
            <input id="commander-search" type="search" placeholder="Search commander name" />
          </div>
          <div class="player-table-wrapper">
            <table class="player-table commander-stats-table">
              <thead>
                <tr>
                  <th class="sortable-header" data-column="commander">Commander <span class="sort-indicator"></span></th>
                  <th class="sortable-header" data-column="games">Games <span class="sort-indicator"></span></th>
                  <th class="sortable-header" data-column="wins">Wins <span class="sort-indicator"></span></th>
                  <th class="sortable-header" data-column="winRate">Win rate <span class="sort-indicator"></span></th>
                  <th class="sortable-header" data-column="kills">Kills <span class="sort-indicator"></span></th>
                  <th class="sortable-header" data-column="kd">K/D <span class="sort-indicator"></span></th>
                  <th class="sortable-header" data-column="avgPlace">Avg place <span class="sort-indicator"></span></th>
                  <th class="sortable-header" data-column="expected">Expected power <span class="sort-indicator"></span></th>
                  <th class="sortable-header" data-column="actual">Actual power <span class="sort-indicator"></span></th>
                </tr>
              </thead>
              <tbody id="commander-stats-body"></tbody>
            </table>
          </div>
        </section>
        <section class="card">
          <div class="page-switch">
            <a href="index.html" class="page-link">Game Tracker</a>
            <a href="player.html" class="page-link">Player Stats</a>
            <a href="history.html" class="page-link">Full History</a>
          </div>
        </section>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
