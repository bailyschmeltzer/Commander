name: Backup Cloudflare KV

on:
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * *'

permissions:
  contents: write

env:
  BACKUP_ROOT: backups/cloudflare-kv
  CLOUDFLARE_KV_KEY: pod:default:state

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch Cloudflare KV state
        id: fetch
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
        run: |
          set -euo pipefail

          timestamp="$(date -u +"%Y-%m-%dT%H-%M-%SZ")"
          encoded_key="$(python3 - <<'PY'
import os
import urllib.parse

print(urllib.parse.quote(os.environ['CLOUDFLARE_KV_KEY'], safe=''))
PY
          )"

          mkdir -p "$BACKUP_ROOT/history"

          curl --fail --silent --show-error \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/storage/kv/namespaces/$CLOUDFLARE_KV_NAMESPACE_ID/values/$encoded_key" \
            -o "$BACKUP_ROOT/current.raw.json"

          python3 - <<'PY'
import json
import os
from pathlib import Path

path = Path(os.environ['BACKUP_ROOT']) / 'current.raw.json'
data = json.loads(path.read_text(encoding='utf-8'))
path.write_text(json.dumps(data, indent=2, sort_keys=True) + '\n', encoding='utf-8')
PY

          if [ -f "$BACKUP_ROOT/latest.json" ] && cmp -s "$BACKUP_ROOT/latest.json" "$BACKUP_ROOT/current.raw.json"; then
            echo "No data changes detected; skipping backup commit."
            rm "$BACKUP_ROOT/current.raw.json"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cp "$BACKUP_ROOT/current.raw.json" "$BACKUP_ROOT/latest.json"
          cp "$BACKUP_ROOT/current.raw.json" "$BACKUP_ROOT/history/$timestamp.json"
          rm "$BACKUP_ROOT/current.raw.json"

          {
            echo "retrievedAt=$timestamp"
            echo "changed=true"
          } >> "$GITHUB_OUTPUT"

      - name: Commit backup
        if: steps.fetch.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: back up Cloudflare KV state"
          file_pattern: backups/cloudflare-kv/latest.json backups/cloudflare-kv/history/*.json
