      const CATEGORY_LABELS = {
        ability: 'Keyword Ability',
        action: 'Keyword Action',
        word: 'Ability Word',
      };

      let allKeywords = [];
      let activeCategory = 'all';
      let searchQuery = '';

      function escapeHtml(str) {
        return String(str || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function getDescriptionFor(name) {
        return KEYWORD_DESCRIPTIONS[name.toLowerCase()] || null;
      }

      function renderGrid() {
        const grid = document.getElementById('keyword-grid');
        const status = document.getElementById('keyword-status');

        const filtered = allKeywords.filter((kw) => {
          if (activeCategory !== 'all' && kw.category !== activeCategory) return false;
          if (searchQuery) {
            const q = searchQuery.toLowerCase();
            return kw.name.toLowerCase().includes(q) || (kw.description || '').toLowerCase().includes(q);
          }
          return true;
        });

        if (!filtered.length) {
          grid.innerHTML = '';
          status.textContent = allKeywords.length ? 'No keywords match your search.' : '';
          status.className = 'status-muted';
          return;
        }

        status.textContent = `Showing ${filtered.length} keyword${filtered.length === 1 ? '' : 's'}`;
        status.className = 'status-muted';

        grid.innerHTML = filtered.map((kw) => `
          <article class="keyword-card">
            <div class="keyword-card-header">
              <strong class="keyword-card-name">${escapeHtml(kw.name)}</strong>
              <span class="keyword-card-badge keyword-card-badge--${escapeHtml(kw.category)}">${escapeHtml(CATEGORY_LABELS[kw.category] || kw.category)}</span>
            </div>
            <p class="keyword-card-description">${kw.description
              ? escapeHtml(kw.description)
              : `<a class="keyword-rules-link" href="https://scryfall.com/search?q=oracle%3A%22${encodeURIComponent(kw.name)}%22&order=edhrec" target="_blank" rel="noopener noreferrer">Search on Scryfall ↗</a>`
            }</p>
          </article>`).join('');

        // Re-insert links safely (we escaped everything, so re-render links via DOM)
        filtered.forEach((kw, i) => {
          if (!kw.description) {
            const card = grid.children[i];
            const p = card?.querySelector('.keyword-card-description');
            if (p) {
              const a = document.createElement('a');
              a.className = 'keyword-rules-link';
              a.href = `https://scryfall.com/search?q=oracle%3A%22${encodeURIComponent(kw.name)}%22&order=edhrec`;
              a.target = '_blank';
              a.rel = 'noopener noreferrer';
              a.textContent = 'Search on Scryfall ↗';
              p.textContent = '';
              p.appendChild(a);
            }
          }
        });
      }

      async function loadKeywords() {
        const status = document.getElementById('keyword-status');
        try {
          const res = await fetch('/api/keywords', { cache: 'no-store' });
          if (!res.ok) throw new Error(`Request failed (${res.status})`);
          const data = await res.json();

          const abilities = (data.keywordAbilities || []).map((name) => ({ name, category: 'ability', description: getDescriptionFor(name) }));
          const actions = (data.keywordActions || []).map((name) => ({ name, category: 'action', description: getDescriptionFor(name) }));
          const words = (data.abilityWords || []).map((name) => ({ name, category: 'word', description: getDescriptionFor(name) }));

          allKeywords = [...abilities, ...actions, ...words].sort((a, b) => a.name.localeCompare(b.name));
          status.textContent = '';
          renderGrid();
        } catch (err) {
          status.textContent = 'Unable to load keyword catalog right now. Please refresh the page.';
          status.className = 'status-error';
        }
      }

      document.getElementById('keyword-search').addEventListener('input', (e) => {
        searchQuery = e.target.value.trim();
        renderGrid();
      });

      document.querySelectorAll('.keyword-tab').forEach((tab) => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.keyword-tab').forEach((t) => {
            t.classList.remove('is-active');
            t.setAttribute('aria-selected', 'false');
          });
          tab.classList.add('is-active');
          tab.setAttribute('aria-selected', 'true');
          activeCategory = tab.dataset.category;
          renderGrid();
        });
      });

      loadKeywords();
    </script>
  </body>
</html>
